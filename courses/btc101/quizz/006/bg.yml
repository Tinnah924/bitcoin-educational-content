question: Какво представлява Манифестът Cypherpunk?
answer: Текст, написан от Ерик Хюз, в който се твърди, че неприкосновеността на личния живот е основно право.
wrong_answers:
  - Книга на Джулиан Асанж за бъдещето на технологиите.
  - Документ, в който са описани принципите на Bitcoin.
  - Манифест, написан от Дейвид Чаум, за значението на цифровата валута.
explanation: |
  Манифестът Cypherpunk е написан от Ерик Хюз през 1993 г
  и в него се твърди, че неприкосновеността на личния живот е основно право.
reviewed: true