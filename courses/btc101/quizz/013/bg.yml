question: Какви са основните характеристики на ефективната валута?
answer: Гъвкава, делима, Liquid.
wrong_answers:
  - Гъвкави, делими, нетрайни.
  - Гъвкав, неделим, Liquid.
  - Негъвкава, делима, Liquid.
explanation: |
  Ефективната валута трябва да бъде заменима (взаимозаменяема)
  без загуба на стойност), делима (разделяща се на малки части)
  на части, за да се улеснят транзакциите с различен обем), и
  ликвидна (лесно конвертируема в стоки или услуги).
reviewed: true