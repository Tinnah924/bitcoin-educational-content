question: Кои са органите, които отговарят за издаването на доверителни валути?
answer: Централни банки.
wrong_answers:
  - Търговски банки.
  - Правителства.
  - Частни институции.
explanation: |
  Централните банки са институциите, които отговарят за емитирането на
  фидуциарна валута. Те определят паричната политика и
  определят колко пари трябва да бъдат пуснати в обращение или
  отпечатани.
reviewed: true