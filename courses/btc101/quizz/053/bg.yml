question: Как се нарича процесът, който проверява транзакциите в мрежата Bitcoin?
answer: Mining
wrong_answers:
  - Копаене
  - Събиране на реколтата
  - Фермерство
explanation: |
  Процесът, който проверява транзакциите в Bitcoin
  се нарича mining. Миньорите извършват криптографска
  задача и получават възнаграждение чрез издаване на нови биткойни.
reviewed: true