question: Как се нарича събитието, при което наградата за mining се намалява наполовина?
answer: Halving
wrong_answers:
  - Удвояване
  - Кварталиране
  - Утрояване
explanation: |
  Събитието, при което наградата за mining се намалява наполовина, се нарича
  намаляване наполовина. Това събитие дава на кривата на паричната емисия
  подобна на стълба форма.
reviewed: true