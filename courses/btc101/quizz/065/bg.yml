question: Кои са трите основни функции на Bitcoin wallet?
answer: Получаване на биткойни, изпращане на биткойни, предпазване от хакерски атаки и опити за кражба.
wrong_answers:
  - Съхранявайте биткойни, изпращайте биткойни, защитавайте ги от хакерски атаки и опити за кражба.
  - Позволява получаването на биткойни, съхранява биткойни и ги предпазва от опити за хакване и кражба.
  - Разрешете получаването на биткойни, разрешете изпращането на биткойни, продажбата на биткойни.
explanation: |
  Bitcoin wallet се използва за взаимодействие с Bitcoin
  мрежа. Трите му основни функции са да позволява получаването на
  биткойни, да позволява изпращането на биткойни и да ги защитава от
  хакерски атаки и опити за кражба.
reviewed: true