question: Какъв е частният ключ в Bitcoin wallet?
answer: Секретен ключ, който ви позволява да подписвате трансакциите си.
wrong_answers:
  - Публичен ключ, използван за адреси generate Bitcoin.
  - Таен списък с думи за унищожаване на wallet в случай на нужда.
  - Секретен ключ за криптиране на транзакциите Bitcoin.
