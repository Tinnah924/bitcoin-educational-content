question: Каква е мнемоничната фраза в Bitcoin wallet?
answer: Списък от 12 или 24 думи, който ви позволява да получите достъп до вашите биткойни.
wrong_answers:
  - Избрана парола за достъп до Bitcoin wallet.
  - Код за криптиране на транзакциите Bitcoin.
  - Тайна фраза за възстановяване, която унищожава Bitcoin wallet в случай на нужда.
explanation: |
  От 2017 г. частният ключ може да бъде кодиран в прост списък
  от 12 или 24 думи, наречен мнемонична фраза. Тази фраза
  е резервно копие на вашия Bitcoin wallet, така че тя ви позволява да
  достъп до вашите биткойни, като използвате всеки Bitcoin wallet
  софтуер/приложение.
reviewed: true