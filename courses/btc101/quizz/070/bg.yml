question: Какъв е рискът от споделяне на публичния ключ на Bitcoin wallet?
answer: Загуба на неприкосновеност на личния живот.
wrong_answers:
  - Унищожаване на Bitcoin wallet.
  - Загуба на биткойни.
  - Хакване на Bitcoin wallet.
explanation: |
  Споделянето на публичния ключ крие рискове за неприкосновеността на личния живот, но не и за
  за сигурността. Това е така, защото публичният ключ се използва за
  generate Bitcoin адреси и по този начин да се получават пари, но той
  не представлява собственост върху биткойните.
reviewed: true