question: Какъв е основният въпрос, който трябва да си зададете при избора на Bitcoin wallet от гледна точка на самонаблюдението?
answer: Вие ли сте собственик на средствата или оставяте контрола върху парите си на трета страна?
wrong_answers:
  - Обезопасен ли е wallet с passphrase?
  - Позволява ли wallet да получава и изпраща биткойни?
  - Мога ли да споделя своя wallet с друго лице?
explanation: |
  При избора на Bitcoin wallet основният въпрос е:
  дали сте собственик на средствата или оставяте контрола върху
  на трета страна? Това е така, защото притежателят на
  частния ключ е собственик на биткойните.
reviewed: true