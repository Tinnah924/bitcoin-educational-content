question: Какво е горещ wallet?
answer: Bitcoin wallet в телефона или компютъра, свързан с интернет.
wrong_answers:
  - wallet, който е физически горещ при допир.
  - wallet, който е популярен сред потребителите на Bitcoin.
  - wallet, който се препоръчва за съхранение на големи количества биткойни.
explanation: |
  Горещ wallet е термин, използван за описание на Bitcoin wallet
  който се съхранява на устройство с достъп до интернет, като например
  телефон или компютър. По този начин е лесно да се извърши
  транзакции, но това също така означава, че wallet е
  потенциално уязвим към онлайн заплахи.
reviewed: true