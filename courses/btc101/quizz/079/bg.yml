question: Какво представлява студеният wallet?
answer: wallet е физическо устройство, което съхранява вашите ключове и не е свързано с интернет.
wrong_answers:
  - wallet, който е физически студен при допир.
  - wallet, който е непопулярен сред потребителите на Bitcoin.
  - wallet, който се препоръчва за съхранение на малки количества биткойни.
explanation: |
  Студена wallet е термин, използван за описание на Bitcoin wallet
  който се съхранява на устройство, което не е свързано с
  интернет. Това го прави по-малко уязвим към онлайн заплахи,
  но също така означава, че wallet е по-малко достъпен за
  ежедневните транзакции.
reviewed: true