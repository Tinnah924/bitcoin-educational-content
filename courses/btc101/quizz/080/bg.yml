question: Какво е многозначен wallet?
answer: Набор от портфейли, който изисква множество подписи за извършване на транзакция.
wrong_answers:
  - wallet, който изисква само един подпис за извършване на транзакция.
  - wallet, който не изисква подписи за извършване на транзакция.
  - wallet, който изисква физически подпис за извършване на транзакция.
explanation: |
  Многозначен wallet е вид Bitcoin wallet, който изисква
  няколко подписа за извършване на транзакция. Това добавя
  допълнително ниво на сигурност, тъй като това означава, че едно лице
  не може да извърши транзакция без одобрението на
  други лица.
reviewed: true