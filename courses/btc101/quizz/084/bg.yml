question: Каква е препоръчителната употреба на офлайн или студена физическа версия на wallet?
answer: Съхраняване на големи количества.
wrong_answers:
  - Съхраняване на ежедневните разходи.
  - Съхраняване на малки количества.
  - Съхраняване на краткосрочни спестявания.
explanation: |
  Препоръчва се офлайн или студена физическа версия на wallet за
  за съхранение на големи количества, тъй като е по-малко уязвима към
  онлайн заплахите, отколкото горещите портфейли. Въпреки това той не е
  препоръчва за ежедневни разходи, защото е по-малко
  достъпен за ежедневни транзакции.
reviewed: true