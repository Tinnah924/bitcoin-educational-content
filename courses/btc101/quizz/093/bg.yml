question: Какво показва липсата на мнемонична фраза в wallet?
answer: Това показва, че wallet не е сигурен за дългосрочно съхранение на Bitcoin.
wrong_answers:
  - Това показва, че wallet е напълно защитен и не се нуждае от архивиране.
  - Това означава, че wallet може да съдържа много различни връзки.
  - Това предполага, че wallet се архивира автоматично от вашето устройство.
explanation: |
  Липсата на списък от 12 или 24 думи, който е
  в wallet, трябва да ви предупреди, че
  wallet не е сигурен, тъй като не следва стандартните правила за архивиране
  процедури.
reviewed: true