question: Какъв е стандартният метод за възстановяване на вашия wallet?
answer: Въвеждане на мнемоничната фраза в софтуера на wallet.
wrong_answers:
  - Запазване на мнемоничната фраза в цифров файл.
  - Написване на мнемоничната фраза на бяла дъска.
  - Споделяне на вашата мнемонична фраза с доверен приятел.
explanation: |
  Стандартният метод за архивиране на частния ключ в
  Bitcoin wallet е чрез въвеждане на вашата мнемонична фраза във всеки
  wallet софтуер. Това ви позволява да възстановите вашия wallet.
reviewed: false