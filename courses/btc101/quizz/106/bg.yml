question: Какво пречи на всички да използват един и същ Bitcoin wallet?
answer: Различните хора се нуждаят от различни случаи на използване.
wrong_answers:
  - Използването на Bitcoin Wallet е скъпо.
  - Използването на Bitcoin Wallet е незаконно.
  - Хората никога няма да се съгласят с името на такъв wallet.
explanation: |
  Докато един човек може да даде приоритет на сигурността, друг може да
  да цени удобството за потребителя или определени функции. Следователно, един
  gW-7 Wallet може да не отговаря на изискванията на всеки
  изискванията, което налага използването на няколко wallet
  да съществуват различни варианти.
reviewed: true