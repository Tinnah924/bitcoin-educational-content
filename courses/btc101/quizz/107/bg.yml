question: Кога Bitcoin е представен за първи път на света?
answer: 31 октомври 2008 г.
wrong_answers:
  - 3 януари 2009 г.
  - 22 ноември 2009 г.
  - 12 декември 2010 г.
explanation: |
  Bitcoin беше представен за първи път на света на 31 октомври,
  2008 г., когато Satoshi Накамото изпрати имейл до шифърпънка
  съдържащ Бялата книга на Bitcoin.
reviewed: true