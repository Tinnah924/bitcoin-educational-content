question: Какво представлява транзакция Bitcoin?
answer: Прехвърляне на собствеността върху биткойни с помощта на криптография.
wrong_answers:
  - Физически обмен на биткойни с помощта на нотариус.
  - Прехвърляне на собствеността върху биткойни с помощта на физически адрес.
  - Прехвърляне на собствеността върху биткойни с помощта на имейл адрес.
explanation: |
  Транзакция Bitcoin е цифров трансфер на
  собственост върху биткойни чрез използване на адрес Bitcoin
  получен благодарение на криптографията на елиптичната крива. Този
  адрес е уникален за wallet на лицето, което получава транзакцията
  биткойни.
reviewed: true