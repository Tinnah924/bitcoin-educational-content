question: Каква е ролята на възел Bitcoin в мрежата Bitcoin?
answer: Той валидира нови блокове и включени транзакции.
wrong_answers:
  - Той създава нови биткойни и ги поставя в блоковете.
  - Тя регулира цената на Bitcoin.
  - Той управлява мрежата Bitcoin.
explanation: |
  Възел Bitcoin в мрежата Bitcoin обработва
  валидирането на нови блокове и включени транзакции. Той е
  тази мрежа от възли Bitcoin я прави наистина
  децентрализирана.
reviewed: true