question: Какво е HashRate?
answer: Броят на хеш изчисленията, които устройство mining може да извърши за секунда, за да реши Proof of Work.
wrong_answers:
  - Скоростта, с която устройство mining може да реши Proof of Work.
  - Общият брой миньори в мрежата Bitcoin.
  - Общото количество биткойни, добити чрез извършване на определен брой опити в секунда за решаване на Proof of Work.
