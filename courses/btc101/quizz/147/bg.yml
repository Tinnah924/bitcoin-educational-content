question: Каква е ролята на ASIC в Bitcoin mining?
answer: ASIC са машини, предназначени единствено за прилагане на алгоритъма SHA256 в процеса mining.
wrong_answers:
  - ASIC се използват за проверка на трансакциите Bitcoin, като в процеса на проверка се прилага алгоритъмът SHA256.
  - ASIC се използват за произволно създаване на нови биткойни.
  - ASIC се използват за защита на мрежата Bitcoin.
explanation: |
  ASIC (Application-Specific Integrated Circuits) са
  специализиран хардуер, проектиран специално за Bitcoin
  mining. Те са оптимизирани да извършват хеширането SHA256
  което е математическата задача, която миньорите решават
  трябва да решат в процеса Proof of Work.
reviewed: true