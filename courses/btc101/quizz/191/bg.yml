question: Кое е едно от нещата, които трябва да имате, преди да купите Bitcoin?
answer: Сигурен wallet.
wrong_answers:
  - Физически сейф.
  - Банкова сметка.
  - Кредитна карта.
explanation: |
  В текста на курса се споменава, че преди да закупите Bitcoin, трябва
  трябва да разполагате със защитена wallet, където да съхранявате ключовете си.
reviewed: true