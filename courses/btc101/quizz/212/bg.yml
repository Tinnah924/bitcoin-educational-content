question: Какво подсказва този курс за бъдещето на Bitcoin?
answer: Тя няма да изчезне.
wrong_answers:
  - Тя ще бъде заменена с по-добра технология.
  - Той ще бъде забранен в целия свят.
  - Тя ще загуби стойността си.
explanation: |
  Текстът на курса предполага, че Bitcoin няма да
  изчезне. Напротив, революцията тепърва започва.
reviewed: true