question: Какъв е проблемът с мащабируемостта на Bitcoin?
answer: Предизвикателството да се внедри парична система, способна да осигурява все по-голям брой транзакции в секунда, докато тя се приема.
wrong_answers:
  - Трудността на mining за нови биткойни с нарастваща стойност с течение на времето.
  - Волатилността на цената на Bitcoin, която ще се увеличава след всяко намаляване наполовина.
  - Липсата на регулация за Bitcoin, която ще направи сделките незаконни.
