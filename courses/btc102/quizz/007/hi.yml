question: डेटा बैकअप में 3-2-1 रूल का मतलब है:  

- **3 कॉपीज़**: अपने डेटा की कम से कम 3 अलग-अलग कॉपीज़ रखें (मूल डेटा + 2 बैकअप)।  
- **2 अलग मीडिया**: इन बैकअप्स को 2 अलग-अलग स्टोरेज टाइप्स पर सेव करें (जैसे एक्सटर्नल हार्ड ड्राइव और क्लाउड स्टोरेज)।  
- **1 ऑफसाइट बैकअप**: कम से कम 1 बैकअप को दूसरी लोकेशन (ऑफिस/घर से बाहर) में रखें ताकि आपदा आने पर डेटा सेफ रहे।  

यह रूल डेटा लॉस से बचाने का एक सुरक्षित तरीका है!
answer: 3 कॉपी 2 अलग-अलग मीडिया पर, जिनमें से 1 ऑफ-साइट स्टोर की गई हो
wrong_answers:
  - 3 कॉपियां - 2 ऑनलाइन मीडिया पर और 1 फिजिकल डिवाइस पर
  - 3 मीडिया जिनकी 2 कॉपी हैं, जिनमें से एक ऑफ-साइट है
  - 3 कॉपी, जिनमें से 2 एन्क्रिप्टेड हैं और 1 ऑफ-साइट स्टोर की गई है
explanation: |
  यह नियम सुझाव देता है कि डेटा की 3 कॉपीज़ 2 अलग-अलग तरह के मीडिया पर रखें, और उनमें से 1 कॉपी ऑफ-साइट (दूसरी जगह) स्टोर करें ताकि सिस्टम ज्यादा मजबूत बने।
reviewed: false