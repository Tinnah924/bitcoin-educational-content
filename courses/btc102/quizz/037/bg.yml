question: Какво задължително трябва да избягвате, за да гарантирате сигурността на вашите биткойни?
answer: Съхраняване на вашите биткойни в платформа за обмен
wrong_answers:
  - Използване на хардуер с отворен код wallet
  - Използване на горещ wallet за ежедневни операции
  - Разнообразяване на методите за съхранение
explanation: |
  Принципът "Не вашите ключове, не вашите биткойни" подчертава важността на притежаването на собствени частни ключове. В платформата за обмен вашите биткойни са изложени на ненужни рискове.
reviewed: false