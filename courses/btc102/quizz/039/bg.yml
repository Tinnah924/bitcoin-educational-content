question: Кой потребителски профил редовно натрупва биткойни чрез осредняване на цената на долара?
answer: Уредът за подреждане
wrong_answers:
  - Ходърът
  - Активният потребител
  - Параноикът
explanation: |
  Подреждащият редовно купува малки количества, за да осредни покупната цена в дългосрочен план.
reviewed: false