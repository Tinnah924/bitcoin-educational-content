question: Каква стратегия за придобиване може да бъде приета от хибриден холер?
answer: Осредняване на разходите в долари
wrong_answers:
  - Алгоритмична търговия
  - Арбитраж
  - Хакерство
explanation: |
  Осредняването на разходите в долари позволява редовните покупки на биткойни да изгладят средната цена на покупката с течение на времето. Ходлърът може да комбинира това с периодични покупки на еднократна сума.
reviewed: false