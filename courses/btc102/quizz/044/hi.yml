question: टर्म "hodler" का मूल क्या है?
answer: "hold" का गलत वर्तनी
wrong_answers:
  - "होल्ड" के लिए एक संक्षिप्त रूप
  - "Hot Wallet" का संक्षिप्त रूप
  - "HODL chain" का संक्षिप्त रूप
explanation: |
  शब्द "होडलर" Bitcoin टॉक पर एक टाइपो से आया है, जहां "होल्ड" को गलती से "HODL" लिख दिया गया था, जो लॉन्ग-टर्म होल्डिंग को दर्शाता है।
