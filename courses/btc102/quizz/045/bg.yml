question: Защо е препоръчително редовно да прехвърляте средства от горещ wallet към хардуерен wallet?
answer: Намаляване на риска от хакерство
wrong_answers:
  - Увеличаване на ликвидността на wallet
  - Намаляване на таксите за транзакции
  - Оптимизиране на поверителността на UTXO
explanation: |
  Прехвърлянето към хардуерен wallet осигурява сигурност на средствата чрез съхраняване на частни ключове офлайн.
