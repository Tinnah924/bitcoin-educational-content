question: Кой инструмент ви позволява да наблюдавате своя wallet, без да разкривате частните си ключове?
answer: Само за наблюдение Wallet
wrong_answers:
  - Hot Wallet
  - Мълния Wallet
  - Попечителство Wallet
explanation: |
  wallet използва само публични ключове за показване на салдата и транзакциите, без да рискува разкриването на частни ключове.
reviewed: false