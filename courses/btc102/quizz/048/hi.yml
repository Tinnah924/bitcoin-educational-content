question: एक स्टैकर मुख्य रूप से कौन सी निवेश रणनीति अपनाता है?
answer: डॉलर-कॉस्ट एवरेजिंग
wrong_answers:
  - डे ट्रेडिंग
  - "अर्बिट्राज" (Arbitrage)
  - एकमुश्त (Ek Mushth)
explanation: |
  DCA में एक निश्चित रकम नियमित रूप से निवेश करना शामिल है ताकि मार्केट के उतार-चढ़ाव का आपके पोर्टफोलियो पर असर कम हो सके।
reviewed: false