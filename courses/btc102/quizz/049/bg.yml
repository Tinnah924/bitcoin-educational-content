question: Каква е основната цел на подреждането?
answer: Постепенно натрупване на сатоши
wrong_answers:
  - Краткосрочни спекулации
  - Закупуване на голямо количество сатоши наведнъж
  - Използване на Bitcoin за ежедневни плащания
explanation: |
  Подреждащият инвестира малки суми на равни интервали от време, за да осредни покупната цена с течение на времето.
