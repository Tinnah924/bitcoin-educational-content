question: Коя услуга съдържа списък на търговците, които приемат биткойн в цял свят?
answer: Карта на БТК
wrong_answers:
  - CoinMarketCap
  - Разговор за Bitcoin
  - Швейцарска заплата Bitcoin
explanation: |
  BTC Map е специална платформа, която открива търговци, приемащи биткойни по целия свят.
