question: Kulingana na uchambuzi wa kihistoria, ni sababu gani kuu iliyofanya mali binafsi isiendane na jamii za kale?
answer: Shughuli za kujikimu kama vile uwindaji zilihitaji maeneo makubwa ambayo hayangeweza kumilikiwa na watu binafsi
wrong_answers:
  - Imani za kidini zilipiga marufuku umiliki wa ardhi na maliasili kwa mtu binafsi
  - Viongozi wa kisiasa walizuia mali binafsi kimakusudi ili kudumisha udhibiti kamili
  - Vikwazo vya kiteknolojia vilifanya iwe vigumu kuweka alama na kulinda mipaka ya mali
explanation: |
  Maandishi yanaelezea wazi kwamba katika jamii za zamani, hali ya kujikimu, hasa uwindaji, ilihitaji maeneo makubwa ambayo hayakuwa sawa na mali za kibinafsi. Hali hii ilikuwa kizuizi cha kimuundo kilichotokana na mahitaji ya kuishi badala ya mambo ya kiitikadi, kisiasa, au kiteknolojia. Ingawa chaguzi nyingine zinaweza kuwezekana katika baadhi ya muktadha wa kihistoria, hazipendekezwi na uchambuzi wa sura hii, ambao unazingatia vikwazo vya kiuchumi na vitendo badala ya makatazo ya kidini, udhibiti wa kisiasa wa makusudi, au mapungufu ya alama za kiteknolojia.
