question: Tocqueville anabainisha nini kama kiwango cha juu zaidi cha ubinafsi wa kibinadamu katika vitendo?
answer: Kusahau jamii kubwa zaidi ili kuzingatia nafsi yako na mzunguko wa karibu wa mtu
wrong_answers:
  - Kutengwa kabisa na kukataliwa kwa vifungo na majukumu yote ya kijamii
  - Kufuatilia faida za kimwili za papo hapo bila kujali matokeo ya baadaye
  - Kuongeza utajiri wa kibinafsi kwa gharama ya mambo mengine yote
explanation: |
  Kulingana na uchunguzi wa Tocqueville katika Demokrasia Amerika, ubinafsi wa kweli ambao wanadamu wanaweza kuonyesha ni kusahau jamii kubwa zaidi na badala yake kuzingatia wao wenyewe pamoja na mzunguko wao wa karibu (familia na washirika wa karibu). Hii inaonyesha kwamba maslahi binafsi si tu ya mtu binafsi bali yanajumuisha familia na miunganisho ya kijamii ya karibu. Chaguzi nyingine zinaelezea aina za ubinafsi finyu ambazo Tocqueville anasema haziendani na tabia halisi ya kibinadamu, kwa sababu kwa kawaida watu hupanua wasiwasi wao zaidi ya mipaka mikali ya kibinafsi ili kuhusisha wapendwa wao na jamii zao za karibu.
