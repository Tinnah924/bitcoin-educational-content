question: Kulingana na uchambuzi wa Paul Leroy-Beaulieu wa 1883, mifumo ya ujumuishaji kwa kawaida hupataje uvumbuzi wa kiteknolojia na kiutaratibu?
answer: Wanaiga uvumbuzi uliotengenezwa nje na jamii za soko huria kwa sababu hawawezi kuunda uvumbuzi wa ndani wa generate
wrong_answers:
  - Wanaendeleza uvumbuzi kupitia kamati kuu za utafiti zinazoratibu maendeleo ya kisayansi
  - Wanaunda uvumbuzi kwa kuunganisha maarifa ya pamoja na kuondoa vikwazo vya ushindani kwa ushirikiano
  - Wanabuni generate kupitia taasisi zinazofadhiliwa na serikali zinazolenga rasilimali katika uboreshaji wa kimfumo
explanation: |
  Paul Leroy-Beaulieu alitabiri kwamba mifumo ya ujumuishaji haingeweza kuhimili uvumbuzi wa ndani kutokana na asili yake ya urasimu na ukosefu wa motisha za kibinafsi. Alitabiri kwa usahihi kwamba jamii za kikomunisti zingeitegemea kuiga uvumbuzi kutoka kwa jamii huru badala ya kuunda zao wenyewe, kwa sababu ukosefu wa mifumo ya malipo binafsi na udhibiti mgumu unazuia mpango wa kuchukua hatari na ubunifu unaohitajika kwa uvumbuzi wa kweli.
