question: Kulingana na nadharia ya maelewano ya maslahi, maendeleo ya kiteknolojia katika usafiri yana jukumu gani katika kuunda uhusiano wa kimataifa wa amani?
answer: Inawezesha ubadilishanaji wa mara kwa mara na mpana zaidi unaounda utegemezi wa kiuchumi kati ya mataifa
wrong_answers:
  - Inaruhusu vikosi vya kijeshi kutumwa haraka zaidi ili kuzuia migogoro kabla haijaongezeka
  - "Inarahisisha ubadilishanaji wa kitamaduni unaosaidia mataifa kuelewa maadili na mila za kila mmoja"
  - Inapunguza gharama ya maliasili kwa kuzifanya zipatikane kutoka vyanzo vingi vya kimataifa
explanation: |
  Maandishi haya yanabainisha teknolojia za usafirishaji kama mojawapo ya sababu muhimu zilizowezesha kuibuka kwa ‘mnyororo wa maelewano’ kati ya mawakala wa kiuchumi. Kwa kuruhusu mabadilishano ya mara kwa mara na pana zaidi, teknolojia hizi ziliunda utegemezi wa kiuchumi ambapo usumbufu wowote huathiri pande zote. Utegemezi huu wa pande zote mbili hufanya vita kuwa ghali kwa wote, na hivyo kuunda motisha kwa ajili ya amani. Chaguzi nyingine zinazingatia sababu za kijeshi, kitamaduni, au rasilimali ambazo hazijasisitizwa katika mfumo wa maelewano ya maslahi uliowasilishwa.
