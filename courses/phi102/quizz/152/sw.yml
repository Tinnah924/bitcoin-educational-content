question: Ni sifa gani ya msingi inayofanya ukiritimba wa vyama vya siasa kuwa na madhara zaidi kulingana na ukosoaji wa mataifa ya kidemokrasia?
answer: Ukiritimba ni wa muda, na kusababisha kufurahia haraka faida za umeme na upotevu wa rasilimali
wrong_answers:
  - Ukiritimba ni wa kudumu, ukizuia uwezekano wowote wa mabadiliko ya kisiasa au mageuzi
  - Ukiritimba hauna mamlaka ya kisheria, na kufanya maamuzi yote ya kiserikali kuwa batili kikatiba
  - Ukiritimba umegawanywa sana, na kusababisha mkanganyiko na sera zinazokinzana katika maeneo mbalimbali
explanation: |
  Maandishi haya yanabainisha wazi asili ya muda ya ukiritimba wa vyama vya siasa kuwa yenye madhara makubwa kwa sababu huunda motisha ya kutumia haraka faida za madaraka, matumizi mabaya ya rasilimali za umma, na utungaji wa sheria wa haraka unaofanywa na watu wasio na sifa, wanaotambua kuwa muda wao wa kuwa madarakani ni mfupi. Hii hutofautiana na ukiritimba wa kudumu au matatizo mengine ya kimuundo, kwa kuwa ufupi wa muda wenyewe ndio unaochochea mifumo ya tabia ya uharibifu iliyoelezwa katika ukosoaji.
