question: Kulingana na nadharia ya uchumi huria, ni sababu gani kuu kwa nini kodi ya kimaendeleo inachukuliwa kuwa tatizo ikilinganishwa na kodi sawia?
answer: Inawachukulia watu binafsi kama mali ya kundi badala ya kutambua ulinzi sawa chini ya sheria
wrong_answers:
  - Inaleta ugumu wa kiutawala unaofanya ukusanyaji wa kodi kutokuwa na ufanisi na gharama kubwa
  - Inapunguza mapato ya serikali kwa kukataza shughuli za kiuchumi katika viwango vya juu vya mapato
  - Inakiuka kanuni ya utawala wa wengi kwa kupendelea maslahi ya wachache kuliko mahitaji ya pamoja
explanation: |
  Wanauchumi wa kiliberali walikosoa kodi ya kimaendeleo kwa sababu inarudisha dhana za kale za umiliki wa pamoja wa watu binafsi, ambapo mtu hafikiriwi kama raia huru bali kama mali ya jamii au dola. Kwa kuwa raia wote wanapata ulinzi sawa wa kisheria, kanuni ya haki inahitaji wachangie kwa uwiano sawa, si kwa viwango vinavyoendelea. Kodi ya kimaendeleo inadokeza kimakosa kwamba watu waliofanikiwa zaidi wana deni la ziada kwa jamii kwa sababu ya mafanikio yao, jambo linalopingana na wazo la usawa wa kiraia katika haki na wajibu.
