question: Kulingana na uchambuzi wa Bastiat wa dhana potofu za kiuchumi, ni kosa gani la msingi ambalo watetezi wa haki za binadamu hufanya kuhusu aina ya kazi na madhumuni yake?
answer: Wanachukulia kazi kama lengo lenyewe badala ya kama njia ya kupata kuridhika kwa wafanyakazi.
wrong_answers:
  - Wanazingatia sana matokeo ya kazi badala ya juhudi na nguvu zinazotumiwa na wafanyakazi
  - Wanapa kipaumbele kuridhika kwa mfanyakazi mmoja mmoja kuliko hitaji la pamoja la kuongeza viwango vya jumla vya ajira
  - Hawatambui kwamba kazi inapaswa kusambazwa sawa miongoni mwa wanajamii wote
explanation: |
  Bastiat alitambua dhana muhimu kwamba watetezi hubadilisha uhusiano kati ya njia na malengo. Wanasherehekea kazi kama lengo lenyewe, wakithamini matumizi ya nguvu na nishati bila kuzingatia kile ambacho shughuli hiyo inafanikisha. Waliberali kama Bastiat wanasema kwamba kazi ni njia tu—lengo la kweli ni kuongeza kuridhika kwa wafanyakazi kwa kiasi sawa cha kazi. Mabadiliko haya yanaonekana pia katika maeneo mengine, kama vile kuchukulia uhuru wa kisiasa kama lengo kuu badala ya kama njia ya kufikia uhuru wa kiraia na kiuchumi.
