question: Kulingana na nadharia ya uchumi huria, ni sababu gani kuu kwa nini wanawake na watoto hufaidika hasa kutokana na maendeleo ya kibepari ikilinganishwa na jamii za kale?
answer: Kazi inazidi kuwa ya kiufundi na kiakili, ikipunguza faida ya nguvu za kimwili na kuhitaji elimu kuliko uchungu wa haraka.
wrong_answers:
  - Jamii za kibepari huunda ulinzi maalum wa kisheria kwa wanawake na watoto ambao jamii za kale hazikuwa nao
  - Mkusanyiko wa mtaji huwawezesha wamiliki matajiri kutoa mazingira bora ya kazi kutokana na wajibu wa kimaadili
  - Ushindani wa soko unawalazimisha waajiri kutoa mishahara mikubwa kwa wanawake na watoto ili kuvutia wafanyakazi wachache
explanation: |
  Paul Leroy-Beaulieu alisema kwamba mageuzi kuelekea kazi za mitambo na kiakili yalibadilisha kimsingi thamani ya kiuchumi ya aina tofauti za kazi. Katika jamii za kale, nguvu za kimwili zilikuwa muhimu, jambo lililowaweka wanawake katika nafasi dhaifu na kufanya ajira ya watoto kuwa na thamani ya haraka. Kadri ubepari ulivyoendelea, kazi ilizidi kutegemea nguvu za kimwili na zaidi ujuzi na akili, hali iliyowawezesha wanawake kushindana kwa ufanisi zaidi na kufanya elimu kuwa ya thamani kuliko ajira ya watoto ya mara moja. Mabadiliko haya ya kimuundo, badala ya ulinzi wa kisheria au wajibu wa kimaadili, ndiyo yaliyozalisha hali za kiuchumi zilizoboresha hadhi yao.
