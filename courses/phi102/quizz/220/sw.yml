question: Kulingana na uchambuzi wa maandishi kuhusu kutofautiana kwa ujamaa, kwa nini wasoshalisti wanakubali mipaka ya eneo kati ya mataifa huku wakikataa haki za mali za mtu binafsi?
answer: Bado wamenaswa katika dhana za kikabila za kale ambapo mali ya pamoja ilikuwa ya makabila mengine pekee bila kutambua upanuzi wa kimantiki wa haki za mtu binafsi.
wrong_answers:
  - Wanaamini mipaka ya kitaifa ni miundo ya asili ilhali mali ya mtu binafsi ni muundo bandia wa kijamii unaosababisha ukosefu wa usawa.
  - Wanasema kwamba umiliki wa pamoja hutumikia manufaa ya wote huku mali ya mtu binafsi ikisababisha unyonyaji wa tabaka la wafanyakazi.
  - Wanasisitiza kwamba uhuru wa eneo ni muhimu kwa ajili ya uhifadhi wa kitamaduni huku mali binafsi ikidhoofisha mshikamano wa kijamii
explanation: |
  Maandishi yanasema kwamba wasoshalisti bado wamefungwa na dhana za kale za kikabila, ambapo mali ya pamoja ya maeneo ya uwindaji ilikuwa ya makabila mengine pekee. Hii inaonyesha matumizi yasiyolingana ya haki za mali kwa upande wao: wanatetea mali ya pamoja katika ngazi ya kitaifa (mipaka na ardhi ya taifa), huku wakikataa kanuni hiyo hiyo ya kimantiki katika ngazi ya mtu binafsi. Mwandishi anaonyesha utata huu kwa kuhoji kwa nini haki za mali zinapaswa kuheshimiwa kwa makundi lakini zisiheshimiwe kwa watu binafsi, akidokeza kwamba tukifuata mantiki ya mali ya pamoja hadi vitengo vidogo zaidi (kama majimbo madogo au familia), bila shaka tunafikia haki za mali ya mtu binafsi. Majibu mengine yanawakilisha hoja za kawaida za kisoshalisti, lakini yanakosa kushughulikia moja kwa moja ukosoaji wa dhana ya kikabila uliowasilishwa katika maandishi.
