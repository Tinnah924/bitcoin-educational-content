question: Kwa nini maandishi yanasema kwamba mfumo wa ukandamizaji ni bora kuliko mfumo wa kuzuia wakati wa kutekeleza uhuru wa kufanya kazi?
answer: Mfumo wa ukandamizaji huweka vikwazo dhidi ya ukiukwaji halisi na ukiukwaji halisi wa haki za wengine badala ya kuzuia shughuli za kila mtu mapema.
wrong_answers:
  - Mfumo wa ukandamizaji hutoa athari kali zaidi za kuzuia kupitia adhabu kali zaidi zinazozuia ukiukwaji unaowezekana kabla haujatokea.
  - Mfumo wa ukandamizaji huruhusu uratibu bora kati ya sekta tofauti za kitaaluma kupitia mifumo ya usimamizi na udhibiti wa pamoja.
  - Mfumo kandamizi huzalisha mapato zaidi ya kodi kwa huduma za umma kwa kuweka faini na adhabu kwa wale wanaokiuka kanuni
explanation: |
  Maandishi yanasema wazi kwamba kutambua uhuru wa kazi kunamaanisha kukubali ubora wa mfumo kandamizi, ambao unazuia ukiukwaji mbaya na wa kweli wa haki za wengine, badala ya mfumo wa kinga unaozuia shughuli za kila mtu mapema. Mfumo wa kinga huweka ulinzi kwa watu wote kwa kisingizio kwamba baadhi ya watu wanaweza kufanya ukiukwaji, huku mfumo kandamizi ukitenda tu pale madhara halisi yanapotokea. Mbinu hii inaheshimu uhuru wa mtu binafsi kwa kutowaweka vikwazo watu wote kwa msingi wa ukiukwaji wa kinadharia wa siku zijazo, bali kushughulikia makosa halisi tu yanapotokea.
