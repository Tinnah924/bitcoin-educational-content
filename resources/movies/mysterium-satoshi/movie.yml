description: |
  Anfang 2009, inmitten der Finanzkrise, brachte "Satoshi Nakamoto" den Bitcoin in
  Umlauf. Er schuf damit die erste dezentrale und zuverlässige Kryptowährung - und
  ist seit 2011 komplett von der Bildfläche verschwunden. "Mysterium Satoshi"
  erzählt die spannende Entstehungsgeschichte von Bitcoin und der
  Blockchain-Technologie aus Sicht seines geheimnisvollen Schöpfers.
