description: |
  WDK (Wallet Development Kit) by Tether is an open-source, modular toolkit for building self-custodial wallets for both humans and AI agents. It provides first-class Bitcoin support — including a dedicated `@tetherto/wdk-wallet-btc` Bitcoin module and Spark integration for Lightning micropayments — alongside Tether token support across multiple chains. The toolkit lowers the barrier for developers to embed Bitcoin self-custody and Lightning capabilities into mobile, desktop, and agentic applications, with full source transparency and resilience-by-design.
